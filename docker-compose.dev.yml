# OpenWA - Docker Compose for Development
# Usage:
#   cp .env.dev.example .env.dev   # optional
#   docker compose -f docker-compose.dev.yml up -d --build

services:
  openwa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    ports:
      - '127.0.0.1:2785:2785'
    env_file:
      - .env.dev
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    ports:
      - '127.0.0.1:2886:80'
    depends_on:
      openwa:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: openwa-network
