# OpenWA - Production (Traefik + external network)
#
# Deploy:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# First boot only (schema sync): set DATABASE_SYNCHRONIZE=true in .env.prod, then set back to false.

services:
  postgres:
    image: postgres:16-alpine
    container_name: openwa-postgres
    restart: unless-stopped
    expose:
      - '5432'
    env_file:
      - .env.prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - n8n_net

  redis:
    image: redis:7-alpine
    container_name: openwa-redis
    restart: unless-stopped
    env_file:
      - .env.prod
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    expose:
      - '6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - n8n_net

  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    expose:
      - '2785'
    env_file:
      - .env.prod
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      SESSION_DATA_PATH: /app/data/sessions
      STORAGE_LOCAL_PATH: /app/data/media
    volumes:
      - openwa-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - n8n_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.openwa-api.rule=Host(`${TRAEFIK_API_HOST}`)
      - traefik.http.routers.openwa-api.entrypoints=websecure
      - traefik.http.routers.openwa-api.tls=true
      - traefik.http.routers.openwa-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.services.openwa-api.loadbalancer.server.port=2785

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - openwa-api
    networks:
      - n8n_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.openwa-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.openwa-dashboard.entrypoints=websecure
      - traefik.http.routers.openwa-dashboard.tls=true
      - traefik.http.routers.openwa-dashboard.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
      - traefik.http.services.openwa-dashboard.loadbalancer.server.port=80

volumes:
  openwa-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  n8n_net:
    name: ${TRAEFIK_NETWORK:-n8n_default}
    external: true
